<div class="vm-body">
  <div class="vm-title">// After — patrón State</div>

  <button class="vm-coin-btn" (click)="insertCoin()">
    <i class="ti ti-coin" style="font-size: 1.3rem; vertical-align: -3px; margin-right: 8px;"></i>
    INSERTAR MONEDA
  </button>

  <div class="vm-products">
    <button
      *ngFor="let p of vm.products()"
      class="vm-prod-btn"
      (click)="selectProduct(p)">
      {{ p.name }}
      <span class="prod-stock">({{ p.stock }})</span>
    </button>
  </div>

  <div class="vm-divider"></div>

  <div class="vm-screen">
    <div class="vm-screen-label">OUTPUT</div>
    <ul #logContainer>
      <li *ngFor="let msg of vm.logs()">{{ msg }}</li>
    </ul>
  </div>
</div>
