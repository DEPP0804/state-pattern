<div class="vm-body">
  <div class="vm-title">// Before — sin patrón</div>

  <button class="vm-coin-btn" (click)="insertCoin()">
    <i class="ti ti-coin" style="font-size: 1.3rem; vertical-align: -3px; margin-right: 8px;"></i>
    INSERTAR MONEDA
  </button>

  <div class="vm-products">
    <button class="vm-prod-btn" (click)="selectProduct()">
      Seleccionar Producto<br>({{ vm.stock }})
    </button>
  </div>

  <div class="vm-divider"></div>

  <div class="vm-screen">
    <div class="vm-screen-label">OUTPUT</div>
    <ul>
      <li *ngFor="let msg of log">{{ msg }}</li>
    </ul>
  </div>
</div>
